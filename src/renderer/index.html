<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parrot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

  <style>
    :root {
      --bg-0: #0c0d10;
      --bg-1: #111318;
      --bg-2: #181b22;
      --border: rgba(139, 92, 246, 0.12);
      --border-bright: rgba(139, 92, 246, 0.4);
      --violet: #8b5cf6;
      --violet-dim: rgba(139, 92, 246, 0.15);
      --violet-glow: rgba(139, 92, 246, 0.25);
      --red: #ef4444;
      --red-dim: rgba(239, 68, 68, 0.12);
      --red-glow: rgba(239, 68, 68, 0.3);
      --green: #22c55e;
      --green-dim: rgba(34, 197, 94, 0.12);
      --text: #f1f5f9;
      --text-mid: #94a3b8;
      --text-dim: #475569;
    }

    [data-theme="light"] {
      --bg-0: #f0f2f5;
      --bg-1: #ffffff;
      --bg-2: #e8eaef;
      --border: rgba(139, 92, 246, 0.18);
      --border-bright: rgba(139, 92, 246, 0.45);
      --violet: #7c3aed;
      --violet-dim: rgba(124, 58, 237, 0.1);
      --violet-glow: rgba(124, 58, 237, 0.2);
      --red: #dc2626;
      --red-dim: rgba(220, 38, 38, 0.1);
      --red-glow: rgba(220, 38, 38, 0.2);
      --green: #16a34a;
      --green-dim: rgba(22, 163, 74, 0.1);
      --text: #1e293b;
      --text-mid: #475569;
      --text-dim: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg-0);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── TITLEBAR ─────────────────────────────── */
    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: #13141a;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
      -webkit-app-region: drag;
    }
    [data-theme="light"] .titlebar {
      background: #ede9e2;
      border-bottom-color: rgba(0,0,0,0.07);
    }
    body:has(#screen-home[style*="flex"]) .titlebar { display: none; }

    .titlebar-left {
      display: flex; align-items: center; gap: 8px;
      -webkit-app-region: no-drag;
    }
    .titlebar-brand {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.8rem; font-weight: 700;
      letter-spacing: 0.24em; text-transform: uppercase;
      color: var(--text);
    }
    .titlebar-brand span { color: #8b5cf6; }

    /* ── THEME BUTTON — shared by titlebar (#btn-theme) and home (.hed-theme-btn) */
    #btn-theme, .hed-theme-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(139,92,246,0.07);
      border: 1.5px solid rgba(139,92,246,0.28);
      color: rgba(241,245,249,0.45);
      cursor: pointer;
      -webkit-app-region: no-drag;
      transition: background 0.22s ease, border-color 0.22s ease, color 0.22s ease, box-shadow 0.22s ease;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    #btn-theme::before, .hed-theme-btn::before {
      content: '';
      position: absolute; inset: 0; border-radius: 50%;
      background: radial-gradient(circle at 50% -10%, rgba(139,92,246,0.35), transparent 65%);
      opacity: 0;
      transition: opacity 0.22s ease;
      pointer-events: none;
    }
    #btn-theme svg, .hed-theme-btn svg {
      width: 13px; height: 13px; display: block; flex-shrink: 0;
    }
    #btn-theme:hover, .hed-theme-btn:hover {
      background: rgba(139,92,246,0.14);
      border-color: #8b5cf6;
      color: #c4b5fd;
      box-shadow: 0 0 0 3px rgba(139,92,246,0.12), 0 0 18px rgba(139,92,246,0.22);
    }
    #btn-theme:hover::before, .hed-theme-btn:hover::before { opacity: 1; }
    #btn-theme:active, .hed-theme-btn:active {
      transform: scale(0.9);
    }
    [data-theme="light"] #btn-theme,
    [data-theme="light"] .hed-theme-btn {
      background: rgba(124,58,237,0.06);
      border-color: rgba(124,58,237,0.22);
      color: rgba(20,20,20,0.4);
    }
    [data-theme="light"] #btn-theme:hover,
    [data-theme="light"] .hed-theme-btn:hover {
      background: rgba(124,58,237,0.12);
      border-color: #7c3aed;
      color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.10), 0 0 14px rgba(124,58,237,0.18);
    }

    /* ── SCREENS ──────────────────────────────── */
    #screen-home { flex-direction: column; }
    #screen-home,
    #screen-library,
    #screen-recording,
    #screen-analyzing,
    #screen-analysis-result,
    #screen-generating,
    #screen-skill-result,
    #screen-error {
      flex: 1;
      display: none;
      overflow: hidden;
    }

    /* ── HOME SCREEN — EDITORIAL FULL-BLEED ──── */
    /* Default = DARK (no data-theme attribute = dark mode) */
    .home-editorial {
      --hed-bg:       #13141a;
      --hed-text:     #f1f5f9;
      --hed-dim:      rgba(241,245,249,0.28);
      --hed-border:   rgba(241,245,249,0.12);

      flex: 1;
      background: var(--hed-bg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: background 0.35s ease, color 0.35s ease;
      -webkit-app-region: drag;
      color: var(--hed-text);
    }
    [data-theme="light"] .home-editorial {
      --hed-bg:       #ede9e2;
      --hed-text:     #141414;
      --hed-dim:      rgba(20,20,20,0.32);
      --hed-border:   rgba(20,20,20,0.15);
    }

    /* TOP BAR — logo + tagline + theme toggle */
    .hed-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px 10px;
      flex-shrink: 0;
      -webkit-app-region: drag;
      gap: 12px;
    }
    .hed-logo {
      display: flex;
      align-items: center;
      gap: 6px;
      -webkit-app-region: no-drag;
      flex-shrink: 0;
    }
    .hed-logo-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--hed-text);
    }
    .hed-tagline {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--hed-dim);
      -webkit-app-region: no-drag;
    }
    /* TITLE BLOCK — giant type, centered */
    .hed-title-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 0 24px;
      position: relative;
      overflow: hidden;
    }
    .hed-title-line {
      display: flex;
      align-items: center;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--hed-text);
      line-height: 0.86;
      -webkit-app-region: no-drag;
      user-select: none;
    }
    /* Per-line sizes: short words bigger, long word fills width */
    .hed-line-1 { font-size: clamp(4rem, 20vw, 14rem); }
    .hed-line-2 { font-size: clamp(3.5rem, 17.5vw, 12rem); }
    .hed-line-3 { font-size: clamp(3rem, 12vw, 8.5rem); }

    /* Inline SVG icons — sized to match letter height */
    .hed-letter-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
      width: 0.68em;
      height: 0.68em;
    }
    .hed-letter-icon svg { width: 100%; height: 100%; display: block; }
    /* Suffix icons: smaller, sit after the word like punctuation */
    .hed-suffix {
      width: 0.38em;
      height: 0.38em;
      margin-left: 0.1em;
      top: -0.16em;
    }

    /* Scattered decorative text — absolute */
    .hed-scatter {
      position: absolute;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--hed-dim);
      pointer-events: none;
      user-select: none;
      line-height: 1.7;
    }
    .hed-scat-tr { top: 12px; right: 80px; text-align: right; }
    .hed-scat-r  {
      right: -42px; top: 50%; transform: translateY(-50%) rotate(90deg);
      white-space: nowrap;
    }

    /* Floating sparkles */
    .hed-spark {
      position: absolute;
      pointer-events: none;
      user-select: none;
      line-height: 1;
    }
    .hed-spark-1 { top: 14%; right: 18%; font-size: 1.6rem; color: #7c3aed; }
    .hed-spark-2 { bottom: 28%; right: 9%; font-size: 0.85rem; color: #15803d; }
    .hed-spark-3 { top: 62%; left: 5%;  font-size: 0.55rem; color: #dc2626; }

    /* BOTTOM BAR — actions + meta */
    .hed-bottom {
      padding: 12px 24px 18px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .hed-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      -webkit-app-region: no-drag;
      margin-top: 28px;
    }
    .hed-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--hed-dim);
      text-align: right;
      line-height: 1.6;
    }

    /* Glass buttons */
    .hed-btn-glass {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 26px;
      border-radius: 100px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: background 0.2s ease, transform 0.12s ease, box-shadow 0.2s ease;
    }
    .hed-btn-glass:hover  { transform: translateY(-2px); }
    .hed-btn-glass:active { transform: translateY(0); }
    .hed-btn-red {
      background: rgba(220,38,38,0.10);
      border: 1.5px solid #dc2626;
      color: #dc2626;
    }
    .hed-btn-red:hover {
      background: rgba(220,38,38,0.20);
      box-shadow: 0 6px 24px rgba(220,38,38,0.18);
    }
    .hed-btn-violet {
      background: rgba(124,58,237,0.08);
      border: 1.5px solid rgba(124,58,237,0.55);
      color: var(--hed-text);
    }
    .hed-btn-violet:hover {
      background: rgba(124,58,237,0.16);
      border-color: #7c3aed;
      box-shadow: 0 6px 24px rgba(124,58,237,0.16);
    }
    .hed-btn-dot {
      width: 6px; height: 6px;
      background: #dc2626;
      border-radius: 50%;
      animation: blink 1.2s ease-in-out infinite;
      flex-shrink: 0;
    }

    /* ── LIBRARY SCREEN ──────────────────────── */
    .library-layout { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .library-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px; background: var(--bg-1); border-bottom: 1px solid var(--border); flex-shrink: 0;
      -webkit-app-region: drag;
    }
    .btn-back {
      display: flex; align-items: center; gap: 6px; padding: 5px 12px;
      background: transparent; border: 1px solid var(--border); border-radius: 2px;
      color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
      letter-spacing: 0.1em; cursor: pointer; transition: all 0.15s ease;
      -webkit-app-region: no-drag;
    }
    .btn-back:hover { border-color: var(--border-bright); color: var(--text); }
    .library-title {
      font-family: 'Rajdhani', sans-serif; font-size: 0.85rem; font-weight: 700;
      letter-spacing: 0.22em; text-transform: uppercase; color: var(--text);
    }
    .library-count { font-size: 0.55rem; letter-spacing: 0.16em; color: var(--text-dim); min-width: 56px; text-align: right; }
    .lib-filter-bar {
      display: flex; padding: 0 20px; background: var(--bg-1);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .lib-tab {
      padding: 10px 16px; background: transparent; border: none; border-bottom: 2px solid transparent;
      color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
      letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer; transition: all 0.15s ease;
      margin-bottom: -1px;
    }
    .lib-tab:hover { color: var(--text-mid); }
    .lib-tab.active { color: var(--violet); border-bottom-color: var(--violet); }
    .lib-grid-wrap { flex: 1; overflow-y: auto; padding: 16px 20px; position: relative; }
    .lib-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .lib-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; padding: 48px 24px; grid-column: 1 / -1; text-align: center;
    }
    .lib-empty-logo { width: 48px; height: 48px; opacity: 0.25; }
    .lib-empty-title {
      font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-mid);
    }
    .lib-empty-desc { font-size: 0.62rem; color: var(--text-dim); line-height: 1.7; }
    .btn-new-skill-empty {
      display: flex; align-items: center; gap: 8px; padding: 10px 24px; margin-top: 8px;
      background: var(--red-dim); border: 1px solid rgba(239,68,68,0.4); border-radius: 2px;
      color: var(--red); font-family: 'Rajdhani', sans-serif; font-size: 0.9rem; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: all 0.2s ease;
    }
    .btn-new-skill-empty:hover { background: rgba(239,68,68,0.2); box-shadow: 0 0 16px var(--red-glow); }
    .skill-lib-card {
      background: var(--bg-1); border: 1px solid var(--border); border-radius: 4px;
      overflow: hidden; cursor: pointer; transition: border-color 0.15s ease;
      display: flex; flex-direction: column;
    }
    .skill-lib-card:hover { border-color: var(--border-bright); }
    .skill-lib-thumb {
      height: 80px; background: var(--bg-2);
      display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;
    }
    .skill-lib-thumb::before {
      content: ''; position: absolute; inset: 0;
      background-image: radial-gradient(var(--border) 1px, transparent 1px);
      background-size: 12px 12px;
    }
    .skill-lib-initials {
      font-family: 'Rajdhani', sans-serif; font-size: 1.6rem; font-weight: 700;
      color: var(--violet); opacity: 0.8; position: relative; z-index: 1; letter-spacing: 0.1em;
    }
    .skill-lib-body { padding: 10px 12px; display: flex; flex-direction: column; gap: 4px; }
    .skill-lib-name {
      font-family: 'Rajdhani', sans-serif; font-size: 0.85rem; font-weight: 600;
      letter-spacing: 0.04em; color: var(--text); white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; text-transform: capitalize;
    }
    .skill-lib-file { font-size: 0.5rem; letter-spacing: 0.05em; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .skill-lib-tag {
      font-size: 0.48rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--green); border: 1px solid rgba(34,197,94,0.35);
      background: var(--green-dim); padding: 2px 6px; border-radius: 2px; width: fit-content; margin-top: 2px;
    }
    .lib-fab {
      position: fixed; bottom: 20px; right: 20px; width: 48px; height: 48px; border-radius: 50%;
      background: var(--violet); border: none; color: white; font-size: 1.5rem; font-weight: 300;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(139,92,246,0.45);
      transition: transform 0.15s ease, box-shadow 0.15s ease; z-index: 50; line-height: 1;
    }
    .lib-fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(139,92,246,0.6); }

    /* ── RECORDING SCREEN ─────────────────────── */
    .recording-layout { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .rec-hud {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px;
      background: #13141a;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
      -webkit-app-region: drag;
      gap: 12px;
    }
    [data-theme="light"] .rec-hud { background: #ede9e2; border-bottom-color: rgba(0,0,0,0.07); }
    .rec-hud-left  { display: flex; align-items: center; gap: 10px; -webkit-app-region: no-drag; }
    .rec-hud-right { display: flex; align-items: center; gap: 8px; -webkit-app-region: no-drag; }
    .rec-badge {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 6px 16px; border-radius: 100px;
      background: rgba(220,38,38,0.09);
      border: 1.5px solid rgba(220,38,38,0.65);
      box-shadow: 0 0 12px rgba(220,38,38,0.1);
    }
    .rec-dot { width: 7px; height: 7px; background: #dc2626; border-radius: 50%; box-shadow: 0 0 6px #dc2626; animation: blink 1.2s ease-in-out infinite; flex-shrink: 0; }
    .rec-label { font-family: 'Rajdhani', sans-serif; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: #dc2626; }
    .rec-timer { font-family: 'Rajdhani', sans-serif; font-size: 1.6rem; font-weight: 700; letter-spacing: 0.04em; color: var(--text); font-variant-numeric: tabular-nums; }
    .rec-timer span { color: rgba(241,245,249,0.25); }
    [data-theme="light"] .rec-timer span { color: rgba(20,20,20,0.25); }
    .click-counter-badge {
      display: inline-flex; align-items: center;
      padding: 5px 13px; border-radius: 100px;
      font-family: 'Rajdhani', sans-serif; font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: #8b5cf6; background: rgba(139,92,246,0.09);
      border: 1px solid rgba(139,92,246,0.35);
    }
    .btn-cancel {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 18px; border-radius: 100px;
      background: transparent;
      border: 1.5px solid rgba(220,38,38,0.35);
      color: #dc2626;
      font-family: 'Rajdhani', sans-serif; font-size: 0.82rem; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .btn-cancel:hover {
      background: rgba(220,38,38,0.09);
      border-color: #dc2626;
      box-shadow: 0 0 14px rgba(220,38,38,0.15);
    }
    .btn-stop-analyze {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 22px; border-radius: 100px;
      background: rgba(139,92,246,0.10);
      border: 1.5px solid rgba(139,92,246,0.55);
      color: #8b5cf6;
      font-family: 'Rajdhani', sans-serif; font-size: 0.82rem; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer;
      backdrop-filter: blur(12px);
      transition: background 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .btn-stop-analyze:hover:not(:disabled) {
      background: rgba(139,92,246,0.18);
      box-shadow: 0 0 20px rgba(139,92,246,0.25);
      border-color: #8b5cf6;
    }
    .btn-stop-analyze:disabled { opacity: 0.28; cursor: not-allowed; }

    /* Viewfinder */
    .viewfinder-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 22px 24px; background: #080910; position: relative; overflow: hidden;
    }
    .viewfinder-wrap::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
      pointer-events: none; z-index: 10;
    }
    .viewfinder-wrap::after {
      content: ''; position: absolute; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(139,92,246,0.45), transparent);
      animation: scanline 5s linear infinite; z-index: 11; pointer-events: none;
    }
    .viewfinder { position: relative; width: 100%; max-height: 100%; aspect-ratio: 16/9; }
    #preview {
      width: 100%; height: 100%; object-fit: contain; display: block;
      border-radius: 14px; background: #0d0e12;
    }
    .corner { position: absolute; width: 18px; height: 18px; border-color: var(--violet); border-style: solid; z-index: 12; }
    .corner-tl { top: -1px; left: -1px;   border-width: 2px 0 0 2px; border-top-left-radius: 5px; }
    .corner-tr { top: -1px; right: -1px;  border-width: 2px 2px 0 0; border-top-right-radius: 5px; }
    .corner-bl { bottom: -1px; left: -1px;  border-width: 0 0 2px 2px; border-bottom-left-radius: 5px; }
    .corner-br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; border-bottom-right-radius: 5px; }
    .vf-label-tl, .vf-label-tr, .vf-label-bl, .vf-label-br {
      position: absolute; font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase; z-index: 12;
    }
    .vf-label-tl { top: 10px; left: 10px; color: var(--violet); }
    .vf-label-tr { top: 10px; right: 10px; color: var(--text-dim); text-align: right; }
    .vf-label-bl { bottom: 10px; left: 10px; color: var(--text-dim); }
    .vf-label-br { bottom: 10px; right: 10px; color: var(--green); text-align: right; }

    /* Status bar — pill badge row */
    .rec-statusbar {
      display: flex; align-items: center;
      gap: 7px; padding: 9px 18px;
      background: #0d0e12;
      border-top: 1px solid rgba(255,255,255,0.04);
      flex-shrink: 0;
    }
    [data-theme="light"] .rec-statusbar { background: #e5e1d8; border-top-color: rgba(0,0,0,0.06); }
    .statusbar-item {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 11px; border-radius: 100px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.55rem; letter-spacing: 0.09em; text-transform: uppercase;
      color: var(--text-dim);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      white-space: nowrap;
    }
    [data-theme="light"] .statusbar-item {
      background: rgba(0,0,0,0.04);
      border-color: rgba(0,0,0,0.09);
    }
    .statusbar-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); box-shadow: 0 0 5px var(--green); flex-shrink: 0; }
    .statusbar-spacer { flex: 1; }

    /* ── SCR-03 + SCR-05: LOADING ── */
    .loading-screen {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 36px;
      background: var(--bg-0); position: relative;
    }
    .px-swirl {
      width: 200px; height: 200px;
      image-rendering: pixelated;
      /* GSAP will animate rotation */
    }
    [data-theme="light"] .px-swirl {
      filter: brightness(0.7) saturate(1.3);
    }
    .loading-title {
      font-family: 'Rajdhani', sans-serif; font-size: 1.55rem; font-weight: 700;
      letter-spacing: 0.24em; text-transform: uppercase; color: #a78bfa;
    }
    [data-theme="light"] .loading-title { color: #6d28d9; }
    .loading-sub {
      font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
      letter-spacing: 0.12em; color: rgba(167,139,250,0.5);
      margin-top: -16px;
    }
    [data-theme="light"] .loading-sub { color: rgba(109,40,217,0.45); }

    /* ── SCR-04: ANALYSIS RESULT ──────────────── */
    .analysis-layout { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .analysis-header {
      padding: 11px 20px; flex-shrink: 0;
      background: #13141a; border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex; align-items: center; gap: 10px;
      -webkit-app-region: drag;
    }
    [data-theme="light"] .analysis-header { background: #ede9e2; border-bottom-color: rgba(0,0,0,0.07); }
    .analysis-header-pill {
      padding: 3px 11px; border-radius: 100px;
      background: rgba(139,92,246,0.10); border: 1px solid rgba(139,92,246,0.4);
      font-family: 'Rajdhani', sans-serif; font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.22em; text-transform: uppercase; color: #8b5cf6;
      -webkit-app-region: no-drag; flex-shrink: 0;
    }
    .analysis-header-title {
      font-family: 'JetBrains Mono', monospace; font-size: 0.59rem;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim);
      -webkit-app-region: no-drag;
    }
    .analysis-body {
      flex: 1; overflow-y: auto; padding: 32px 36px;
      display: flex; flex-direction: column; gap: 32px;
    }
    .section-label {
      font-family: 'JetBrains Mono', monospace; font-size: 0.63rem;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 16px;
      display: flex; align-items: center; gap: 14px;
    }
    .section-label::after {
      content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.07);
    }
    [data-theme="light"] .section-label::after { background: rgba(0,0,0,0.09); }
    /* Workflow — bold hero, no card chrome */
    .workflow-card { background: none; border: none; border-radius: 0; padding: 0; }
    .workflow-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 3rem; font-weight: 700;
      color: var(--text); letter-spacing: -0.02em; line-height: 1.0;
      margin-bottom: 10px;
    }
    .workflow-desc { font-size: 0.9rem; color: var(--text-mid); line-height: 1.8; max-width: 560px; }
    /* Step pills — rotating color palette */
    .steps-list { list-style: none; display: flex; flex-wrap: wrap; gap: 6px; }
    .steps-list li {
      display: inline-flex; align-items: center;
      padding: 7px 16px; border-radius: 100px;
      font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;
      letter-spacing: 0.04em; border: 1px solid;
    }
    .steps-list li { color: #a78bfa; background: rgba(139,92,246,0.09); border-color: rgba(139,92,246,0.28); }
    /* Per-card accent color via CSS custom property */
    #wr-questions .question-card:nth-child(1) { --qc: #8b5cf6; --qc-alpha: rgba(139,92,246,0.12); --qc-border: rgba(139,92,246,0.28); }
    #wr-questions .question-card:nth-child(2) { --qc: #f97316; --qc-alpha: rgba(249,115,22,0.10); --qc-border: rgba(249,115,22,0.28); }
    #wr-questions .question-card:nth-child(3) { --qc: #22c55e; --qc-alpha: rgba(34,197,94,0.10);  --qc-border: rgba(34,197,94,0.28); }
    .questions-container { display: flex; flex-direction: column; gap: 14px; }
    .question-card {
      position: relative; overflow: hidden;
      background: rgba(255,255,255,0.028); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px; padding: 22px 24px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .question-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2.5px;
      background: var(--qc, #8b5cf6); border-radius: 16px 16px 0 0;
    }
    [data-theme="light"] .question-card { background: rgba(0,0,0,0.028); border-color: rgba(0,0,0,0.08); }
    .question-header { display: flex; align-items: flex-start; gap: 10px; }
    .question-num {
      font-family: 'Rajdhani', sans-serif; font-size: 0.76rem; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--qc, #8b5cf6); flex-shrink: 0; margin-top: 1px;
    }
    .question-text { font-size: 0.92rem; color: var(--text); line-height: 1.65; flex: 1; }
    .question-ctx  { font-size: 0.78rem; color: var(--text-dim); line-height: 1.6; }
    .badge-optional {
      font-family: 'JetBrains Mono', monospace; font-size: 0.55rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text-dim); border: 1px solid rgba(255,255,255,0.1);
      padding: 3px 9px; border-radius: 100px; flex-shrink: 0; margin-top: 2px;
    }
    [data-theme="light"] .badge-optional { border-color: rgba(0,0,0,0.12); }
    .question-answers { display: flex; align-items: flex-start; gap: 8px; flex-wrap: wrap; }
    .btn-answer {
      padding: 7px 18px; border-radius: 100px; background: transparent;
      border: 1.5px solid var(--qc-border, rgba(139,92,246,0.25));
      color: var(--text-mid); font-family: 'Rajdhani', sans-serif; font-size: 0.82rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .btn-answer:hover  { border-color: var(--qc, #8b5cf6); color: var(--qc, #8b5cf6); }
    .btn-answer.active { background: var(--qc-alpha, rgba(139,92,246,0.12)); border-color: var(--qc, #8b5cf6); color: var(--qc, #8b5cf6); }
    .answer-textarea {
      flex: 1; min-width: 180px; background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.08); border-radius: 12px; color: var(--text);
      font-family: 'JetBrains Mono', monospace; font-size: 0.82rem;
      padding: 10px 14px; resize: vertical; min-height: 42px; transition: border-color 0.15s;
    }
    [data-theme="light"] .answer-textarea { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); }
    .answer-textarea:focus { outline: none; border-color: var(--qc, rgba(139,92,246,0.5)); }
    .answer-textarea::placeholder { color: var(--text-dim); }
    .additional-context-section { display: flex; flex-direction: column; }
    .additional-context-textarea {
      width: 100%; background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.08); border-radius: 14px;
      color: var(--text); font-family: 'JetBrains Mono', monospace;
      font-size: 0.84rem; padding: 14px 18px; resize: vertical; min-height: 80px;
      transition: border-color 0.15s;
    }
    [data-theme="light"] .additional-context-textarea { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); }
    .additional-context-textarea:focus { outline: none; border-color: rgba(139,92,246,0.45); }
    .additional-context-textarea::placeholder { color: var(--text-dim); }
    .analysis-footer {
      padding: 15px 24px; border-top: 1px solid rgba(255,255,255,0.06);
      background: #13141a; flex-shrink: 0; display: flex; justify-content: flex-end; align-items: center;
    }
    [data-theme="light"] .analysis-footer { background: #ede9e2; border-top-color: rgba(0,0,0,0.07); }
    .btn-generate {
      padding: 12px 44px; border-radius: 100px;
      background: rgba(139,92,246,0.10); border: 1.5px solid rgba(139,92,246,0.55);
      color: #8b5cf6; font-family: 'Rajdhani', sans-serif; font-size: 1.05rem; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer;
      backdrop-filter: blur(12px);
      transition: background 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .btn-generate:hover:not(:disabled) {
      background: rgba(139,92,246,0.18); border-color: #8b5cf6;
      box-shadow: 0 0 32px rgba(139,92,246,0.35);
    }
    .btn-generate:disabled { opacity: 0.28; cursor: not-allowed; }

    /* ── SCR-05: GENERATING — same as SCR-03 ──── */

    /* ── SCR-06: SKILL RESULT ─────────────────── */
    .skill-layout { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .skill-header {
      padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,0.05);
      background: #13141a; flex-shrink: 0; display: flex; align-items: center; gap: 12px;
      -webkit-app-region: drag;
    }
    [data-theme="light"] .skill-header { background: #ede9e2; border-bottom-color: rgba(0,0,0,0.07); }
    .skill-header-name {
      font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; font-weight: 700;
      letter-spacing: 0.06em; color: var(--text); -webkit-app-region: no-drag;
    }
    .skill-badge {
      padding: 4px 12px; border-radius: 100px;
      font-family: 'Rajdhani', sans-serif; font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--green); border: 1px solid rgba(34,197,94,0.4);
      background: rgba(34,197,94,0.08); -webkit-app-region: no-drag;
    }
    .skill-filename-badge {
      font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
      color: var(--text-dim); -webkit-app-region: no-drag;
    }
    .skill-body { flex: 1; overflow-y: auto; padding: 18px 20px; display: flex; flex-direction: column; gap: 16px; }
    .code-block {
      background: #080a0f; border: 1px solid rgba(139,92,246,0.15);
      border-radius: 14px; overflow: auto; max-height: 280px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }
    [data-theme="light"] .code-block { background: #f0ece4; border-color: rgba(124,58,237,0.15); }
    .code-block pre { padding: 16px 20px; font-size: 0.78rem; line-height: 1.75; white-space: pre; }
    .hl-key     { color: #a78bfa; }
    .hl-punct   { color: var(--text-dim); }
    .hl-str     { color: #4ade80; }
    .hl-comment { color: var(--text-dim); font-style: italic; }
    .hl-header  { color: #a78bfa; font-weight: bold; }
    .install-section { display: flex; flex-direction: column; gap: 14px; }
    .install-card {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px; padding: 16px 18px; display: flex; flex-direction: column; gap: 12px;
    }
    [data-theme="light"] .install-card { background: rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.08); }
    .install-path-tag {
      display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 100px;
      font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;
      color: var(--green); background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.3); width: fit-content;
    }
    .btn-install-auto {
      padding: 10px 24px; border-radius: 100px;
      background: rgba(34,197,94,0.10); border: 1.5px solid rgba(34,197,94,0.45);
      color: var(--green); font-family: 'Rajdhani', sans-serif; font-size: 0.95rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      display: flex; align-items: center; gap: 8px; width: fit-content;
    }
    .btn-install-auto:hover:not(:disabled) {
      background: rgba(34,197,94,0.18); box-shadow: 0 0 20px rgba(34,197,94,0.2);
    }
    .btn-install-auto.installed { opacity: 0.6; cursor: default; }
    .install-usage {
      font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--text-mid);
      padding: 10px 14px; background: rgba(139,92,246,0.06);
      border-left: 2px solid rgba(139,92,246,0.4); border-radius: 0 10px 10px 0; line-height: 1.7;
    }
    .install-usage code { color: #a78bfa; }
    .manual-steps { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .manual-steps li { font-size: 0.8rem; color: var(--text-mid); display: flex; gap: 10px; }
    .inst-num {
      color: #8b5cf6; font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: 0.7rem; min-width: 18px;
    }
    .skill-footer {
      padding: 12px 20px; border-top: 1px solid rgba(255,255,255,0.05);
      background: #13141a; flex-shrink: 0; display: flex; gap: 10px; justify-content: flex-end;
    }
    [data-theme="light"] .skill-footer { background: #ede9e2; border-top-color: rgba(0,0,0,0.07); }
    .btn-secondary {
      padding: 8px 20px; border-radius: 100px; background: transparent;
      border: 1.5px solid rgba(255,255,255,0.14); color: var(--text-mid);
      font-family: 'Rajdhani', sans-serif; font-size: 0.85rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    [data-theme="light"] .btn-secondary { border-color: rgba(0,0,0,0.18); }
    .btn-secondary:hover { border-color: var(--violet); color: var(--violet); }
    .btn-primary {
      padding: 8px 24px; border-radius: 100px;
      background: rgba(139,92,246,0.10); border: 1.5px solid rgba(139,92,246,0.55);
      color: #8b5cf6; font-family: 'Rajdhani', sans-serif; font-size: 0.88rem; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer;
      backdrop-filter: blur(12px); transition: background 0.2s, box-shadow 0.2s;
    }
    .btn-primary:hover { background: rgba(139,92,246,0.18); box-shadow: 0 0 18px rgba(139,92,246,0.25); }

    /* ── ERROR SCREEN ─────────────────────────── */
    .error-layout {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px; padding: 48px;
    }
    .error-icon { font-size: 2rem; color: var(--red); }
    .error-title {
      font-family: 'Rajdhani', sans-serif; font-size: 1.3rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--red);
    }
    #error-message {
      font-size: 0.85rem; color: var(--text-mid); text-align: center; max-width: 480px; line-height: 1.7;
    }
    .error-actions { display: flex; gap: 10px; margin-top: 8px; }

    /* ── LIGHT THEME OVERRIDES ────────────────── */
    [data-theme="light"] .viewfinder-wrap { background: #d8dbe3; }
    [data-theme="light"] .viewfinder-wrap::before { background: none; }
    [data-theme="light"] .viewfinder-wrap::after { background: linear-gradient(90deg, transparent, rgba(124,58,237,0.3), transparent); }
    /* ── SHARED SCROLLBAR ─────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg-0); }
    ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

    /* ── ANIMATIONS ───────────────────────────── */
    @keyframes pulse-dot  { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.75)} }
    @keyframes blink      { 0%,100%{opacity:1} 50%{opacity:.15} }
    @keyframes scanline   { 0%{top:-1px} 100%{top:100%} }
    @keyframes spin       { to{transform:rotate(360deg)} }
    @keyframes fadeIn     { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    #screen-home,
    #screen-library,
    #screen-recording,
    #screen-analyzing,
    #screen-analysis-result,
    #screen-generating,
    #screen-skill-result,
    #screen-error { animation: fadeIn 0.3s ease both; }
  </style>
</head>

  <script>
    (function() {
      const saved = localStorage.getItem('parrot-theme');
      if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');

      var SUN_SVG = '<svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="7" cy="7" r="2.6" fill="currentColor"/><line x1="7" y1="0.5" x2="7" y2="2.2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="7" y1="11.8" x2="7" y2="13.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="0.5" y1="7" x2="2.2" y2="7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="11.8" y1="7" x2="13.5" y2="7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="2.4" y1="2.4" x2="3.6" y2="3.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="10.4" y1="10.4" x2="11.6" y2="11.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="2.4" y1="11.6" x2="3.6" y2="10.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="10.4" y1="3.6" x2="11.6" y2="2.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>';
      var MOON_SVG = '<svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M11.2 9.1A5.1 5.1 0 0 1 4.9 2.8a5.1 5.1 0 1 0 6.3 6.3z" fill="currentColor"/></svg>';

      function updateIcons() {
        const isLight = document.documentElement.getAttribute('data-theme') === 'light';
        const label = isLight ? 'Tema oscuro' : 'Tema claro';
        document.querySelectorAll('#btn-theme, .hed-theme-btn').forEach(function(btn) {
          btn.innerHTML = isLight ? MOON_SVG : SUN_SVG;
          btn.title = label;
        });
      }

      function toggleTheme() {
        const isLight = document.documentElement.getAttribute('data-theme') === 'light';
        const next = isLight ? 'dark' : 'light';
        if (isLight) {
          document.documentElement.removeAttribute('data-theme');
          localStorage.setItem('parrot-theme', 'dark');
        } else {
          document.documentElement.setAttribute('data-theme', 'light');
          localStorage.setItem('parrot-theme', 'light');
        }
        updateIcons();
        // Sync overlay pill theme in real-time
        if (window.parrotAPI && window.parrotAPI.setOverlayTheme) {
          window.parrotAPI.setOverlayTheme(next);
        }
      }

      document.addEventListener('DOMContentLoaded', function() {
        updateIcons();
        document.querySelectorAll('#btn-theme, .hed-theme-btn').forEach(function(btn) {
          btn.addEventListener('click', toggleTheme);
        });
      });
    })();
  </script>
  <script src="renderer.js"></script>
  <script>
    (function() {
      if (typeof gsap === 'undefined') return;
      var tl = gsap.timeline({ delay: 0.08 });
      // Top bar drops in
      tl.from('.hed-topbar', { y: -30, autoAlpha: 0, duration: 0.5, ease: 'expo.out' }, 0);
      // Title lines sweep in from left, staggered
      tl.from('.hed-title-line', {
        x: -80, autoAlpha: 0, skewX: -3,
        stagger: 0.10, duration: 0.65, ease: 'expo.out'
      }, 0.05);
      // SVG icons pop in with overshoot
      tl.from('.hed-letter-icon', {
        scale: 0, rotation: -25, autoAlpha: 0,
        stagger: 0.09, duration: 0.5, ease: 'back.out(2.8)'
      }, 0.18);
      // Glass buttons pop in individually
      tl.from('.hed-btn-glass', {
        y: 12, autoAlpha: 0, scale: 0.9,
        stagger: 0.08, duration: 0.4, ease: 'back.out(2)'
      }, 0.35);
      // Scattered text fades in
      tl.from('.hed-scatter', {
        autoAlpha: 0, duration: 0.5, stagger: 0.06
      }, 0.3);
      // Sparkles pop in then float forever
      tl.from('.hed-spark', {
        scale: 0, autoAlpha: 0, stagger: 0.1, duration: 0.45, ease: 'back.out(2.5)'
      }, 0.45);
      // Continuous floating
      gsap.to('.hed-spark-1', { y: -9, rotation: 18, duration: 2.5, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 0.8 });
      gsap.to('.hed-spark-2', { y: 7, rotation: -20, duration: 2.1, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 1.1 });
      gsap.to('.hed-spark-3', { y: -5, rotation: 12, duration: 2.9, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 1.5 });

      // Theme button — full spin on click (both titlebar + home)
      document.querySelectorAll('#btn-theme, .hed-theme-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          gsap.fromTo(btn,
            { rotation: 0, scale: 1 },
            { rotation: 360, scale: 1, duration: 0.55, ease: 'back.out(1.6)', overwrite: true }
          );
        });
      });
    })();
  </script>
  <script>
    // Screen entrance animations via MutationObserver
    (function() {
      if (typeof gsap === 'undefined') return;
      if (typeof ScrollTrigger !== 'undefined') gsap.registerPlugin(ScrollTrigger);

      function animateAnalysisResult() {
        var body = document.querySelector('#screen-analysis-result .analysis-body');
        var tl = gsap.timeline();
        tl.from('#screen-analysis-result .analysis-header', { y: -16, autoAlpha: 0, duration: 0.3, ease: 'expo.out' }, 0);
        tl.from('#screen-analysis-result .workflow-card', { y: 28, autoAlpha: 0, duration: 0.5, ease: 'expo.out' }, 0.08);
        tl.from('#screen-analysis-result .steps-list li', { y: 14, autoAlpha: 0, scale: 0.82, stagger: 0.05, duration: 0.38, ease: 'back.out(1.8)' }, 0.2);
        tl.from('#screen-analysis-result .analysis-footer', { y: 16, autoAlpha: 0, duration: 0.28, ease: 'expo.out' }, 0.1);
        // Question cards + context via ScrollTrigger in the overflow container
        if (body && typeof ScrollTrigger !== 'undefined') {
          document.querySelectorAll('#screen-analysis-result .question-card').forEach(function(card) {
            gsap.from(card, {
              y: 36, autoAlpha: 0, duration: 0.48, ease: 'expo.out',
              scrollTrigger: { trigger: card, scroller: body, start: 'top 108%', once: true }
            });
          });
          var ctxSection = document.querySelector('#screen-analysis-result .additional-context-section');
          if (ctxSection) {
            gsap.from(ctxSection, {
              y: 24, autoAlpha: 0, duration: 0.4, ease: 'expo.out',
              scrollTrigger: { trigger: ctxSection, scroller: body, start: 'top 108%', once: true }
            });
          }
        }
      }

      function animateSkillResult() {
        var tl = gsap.timeline();
        tl.from('#screen-skill-result .skill-header', { y: -16, autoAlpha: 0, duration: 0.3, ease: 'expo.out' }, 0);
        tl.from('#screen-skill-result .skill-body > *', { y: 24, autoAlpha: 0, stagger: 0.09, duration: 0.45, ease: 'expo.out' }, 0.08);
        tl.from('#screen-skill-result .skill-footer', { y: 16, autoAlpha: 0, duration: 0.3, ease: 'expo.out' }, 0.28);
        tl.from('#screen-skill-result .btn-install-auto', { scale: 0.86, autoAlpha: 0, duration: 0.38, ease: 'back.out(2.2)' }, 0.42);
      }

      function animateLoading(screenId) {
        var prefix = '#' + screenId + ' ';
        var img = document.querySelector(prefix + '.px-swirl');
        // Entrance
        var tl = gsap.timeline();
        tl.from(prefix + '.px-swirl',      { scale: 0.72, autoAlpha: 0, duration: 0.7, ease: 'back.out(1.4)' }, 0);
        tl.from(prefix + '.loading-title', { y: 18, autoAlpha: 0, duration: 0.5, ease: 'expo.out' }, 0.3);
        tl.from(prefix + '.loading-sub',   { y: 10, autoAlpha: 0, duration: 0.4, ease: 'expo.out' }, 0.42);
        // Slow continuous spin (runs independently, loops forever)
        if (img) {
          gsap.to(img, { rotation: 360, duration: 14, ease: 'none', repeat: -1 });
        }
      }

      var screenAnimations = {
        'screen-analyzing':       function() { animateLoading('screen-analyzing'); },
        'screen-generating':      function() { animateLoading('screen-generating'); },
        'screen-analysis-result': animateAnalysisResult,
        'screen-skill-result':    animateSkillResult,
      };

      Object.keys(screenAnimations).forEach(function(id) {
        var el = document.getElementById(id);
        if (!el) return;
        new MutationObserver(function() {
          if (el.style.display === 'flex' || el.style.display === 'block') {
            screenAnimations[id]();
          }
        }).observe(el, { attributes: true, attributeFilter: ['style'] });
      });
    })();
  </script>
