<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parrot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 24px;
    }
    h1 { font-size: 2rem; letter-spacing: 0.1em; }
    .subtitle { color: #888; font-size: 0.9rem; }
    .controls { display: flex; gap: 12px; }
    button {
      padding: 12px 28px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    #btn-record { background: #e53935; color: white; }
    #btn-stop   { background: #555; color: white; }
    #btn-analyze { background: #1976d2; color: white; }
    #status { color: #aaa; font-size: 0.85rem; min-height: 1.2em; }
  </style>
</head>
<body>
  <h1>🦜 Parrot</h1>
  <p class="subtitle">Grabá tu flujo. La IA aprende. Cualquier agente lo reproduce.</p>
  <div class="controls">
    <button id="btn-record">Grabar</button>
    <button id="btn-stop" disabled>Detener</button>
    <button id="btn-analyze" disabled>Analizar</button>
  </div>
  <p id="status">Listo para grabar</p>
  <script src="renderer.js"></script>
</body>
</html>
