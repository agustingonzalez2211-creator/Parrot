<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parrot REC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* Body is fully transparent — the pill is drawn on the inner wrapper */
    html, body {
      background: transparent;
      width: 280px;
      height: 72px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* The actual pill shape */
    .pill {
      width: 270px;
      height: 58px;
      background: #13141a;
      border: 1.5px solid rgba(220, 38, 38, 0.5);
      border-radius: 100px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      -webkit-app-region: drag;
      user-select: none;
      transition: background 0.25s ease, border-color 0.25s ease;
    }

    /* Light theme */
    [data-theme="light"] .pill {
      background: #ede9e2;
      border-color: rgba(220, 38, 38, 0.45);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }
    [data-theme="light"] .timer { color: #141414; }
    [data-theme="light"] .timer span { color: rgba(20, 20, 20, 0.25); }
    [data-theme="light"] .btn-cancel {
      border-color: rgba(0, 0, 0, 0.12);
      color: rgba(0, 0, 0, 0.3);
    }
    [data-theme="light"] .btn-cancel:hover {
      border-color: rgba(220, 38, 38, 0.55);
      color: #dc2626;
      background: rgba(220, 38, 38, 0.08);
    }

    /* REC badge — tight pill */
    .rec-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 11px;
      border-radius: 100px;
      background: rgba(220, 38, 38, 0.12);
      border: 1.5px solid rgba(220, 38, 38, 0.55);
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }

    .rec-dot {
      width: 6px;
      height: 6px;
      background: #dc2626;
      border-radius: 50%;
      box-shadow: 0 0 7px #dc2626;
      animation: blink 1.2s ease-in-out infinite;
      flex-shrink: 0;
    }

    .rec-label {
      font-family: 'Rajdhani', monospace;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #dc2626;
    }

    /* Timer */
    .timer {
      font-family: 'Rajdhani', monospace;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #f1f5f9;
      font-variant-numeric: tabular-nums;
      flex: 1;
      text-align: center;
    }
    .timer span { color: rgba(241, 245, 249, 0.25); }

    /* Action buttons */
    .actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }

    /* ANALIZAR — glass pill, violet */
    .btn-stop {
      padding: 5px 13px;
      background: rgba(139, 92, 246, 0.12);
      border: 1.5px solid rgba(139, 92, 246, 0.6);
      border-radius: 100px;
      color: #a78bfa;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
      white-space: nowrap;
    }
    .btn-stop:hover {
      background: rgba(139, 92, 246, 0.22);
      border-color: #8b5cf6;
      box-shadow: 0 0 14px rgba(139, 92, 246, 0.3);
    }

    /* Cancel — small circle */
    .btn-cancel {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      color: rgba(255, 255, 255, 0.28);
      font-size: 0.6rem;
      cursor: pointer;
      transition: all 0.15s ease;
      line-height: 1;
    }
    .btn-cancel:hover {
      border-color: rgba(220, 38, 38, 0.55);
      color: #dc2626;
      background: rgba(220, 38, 38, 0.1);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
  </style>
</head>
<body>

  <div class="pill">

    <div class="rec-badge">
      <div class="rec-dot"></div>
      <span class="rec-label">REC</span>
    </div>

    <div class="timer" id="timer">00<span>:</span>00</div>

    <div class="actions">
      <button class="btn-stop" id="btn-stop">Analizar</button>
      <button class="btn-cancel" id="btn-cancel" title="Cancelar">✕</button>
    </div>

  </div>

  <script>
    // Initial theme from localStorage (shared file:// origin)
    (function() {
      const saved = localStorage.getItem('parrot-theme');
      if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
    })();

    // Live theme sync — receives push from main window via IPC
    window.overlayAPI.onThemeChange(function(theme) {
      if (theme === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      } else {
        document.documentElement.removeAttribute('data-theme');
      }
    });

    let seconds = 0;

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      seconds++;
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      document.getElementById('timer').innerHTML =
        pad(m) + '<span>:</span>' + pad(s);
    }

    setInterval(tick, 1000);

    document.getElementById('btn-stop').addEventListener('click', () => {
      window.overlayAPI.sendAction('stop-analyze');
    });

    document.getElementById('btn-cancel').addEventListener('click', () => {
      window.overlayAPI.sendAction('cancel');
    });
  </script>
</body>
</html>
